name: CI (plume)

# Socle Epic 1 (AR-15) : lint + typecheck + test + check migrations Drizzle.
# Scopé au sous-projet `plume/` (l'ancien pipeline Python a son propre workflow).

on:
  # Push : filtré aux chemins plume pour économiser des minutes.
  push:
    branches: [dev, main]
    paths:
      - "plume/**"
      - ".github/workflows/ci.yml"
  # PR : PAS de filtre paths -> le job "build" tourne sur CHAQUE PR vers dev/main.
  # Indispensable car "build" est un status check requis : un check filtré qui ne
  # tourne jamais bloque la PR ("Expected — Waiting for status to be reported").
  pull_request:
    branches: [dev, main]

defaults:
  run:
    working-directory: plume

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin explicite : pas de package.json à la racine du repo (le manifeste
          # vit dans plume/), donc action-setup ne peut pas lire `packageManager`.
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: plume/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check Drizzle migrations
        run: pnpm db:check

      - name: Build
        run: pnpm build
