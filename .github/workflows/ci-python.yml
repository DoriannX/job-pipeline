name: CI (pipeline Python)

# Tests du pipeline e-mail historique (racine du repo : main.py, src/, tests/).
# Le job "python-tests" est un status check requis pour la protection de branche.
on:
  # Push : filtré aux chemins Python pour économiser des minutes.
  push:
    branches: [dev, main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/ci-python.yml"
  # PR : PAS de filtre paths -> tourne sur CHAQUE PR vers dev/main (check requis,
  # cf. ci.yml pour l'explication du deadlock des checks filtrés).
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest -q
