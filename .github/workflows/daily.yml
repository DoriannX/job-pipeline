name: Digest emploi quotidien

# Tourne dans le cloud (PC éteint OK). État stocké dans Turso (libSQL) — rien
# n'est re-commité dans le repo. Le digest est envoyé par e-mail.
# Repo public => minutes Actions gratuites illimitées.
on:
  schedule:
    # 06:00 UTC ≈ 08:00 Paris (été) / 07:00 (hiver). Ajuste si besoin.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lancement manuel depuis l'onglet Actions

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le pipeline
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
          EMAIL_LABELS: ${{ secrets.EMAIL_LABELS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SEND_EMAIL: "true"
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python main.py
